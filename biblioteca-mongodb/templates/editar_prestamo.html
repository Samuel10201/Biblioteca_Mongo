{% extends "base_prestamos.html" %}

{% block formulario %}
<h3>Editar Pr&eacute;stamo</h3>

{% if error %}
<p class="msg-error">{{ error }}</p>
{% endif %}

<form method="GET" action="/prestamos/editar">
    <label>ISBN de la copia:</label>
    <input type="text" name="isbn_copia" value="{{ isbn_copia or '' }}" required>

    <label>N&uacute;mero de copia:</label>
    <input type="number" name="numero_copia" value="{{ numero_copia or '' }}" required>

    <label>RUT del usuario:</label>
    <input type="text" name="usuario_rut" value="{{ usuario_rut or '' }}" required>

    <label>Fecha de pr&eacute;stamo:</label>
    <input type="date" name="fecha_prestamo" value="{{ fecha_prestamo or '' }}" required>
    <button type="submit">Buscar</button>
</form>

{% if prestamo %}
<form method="POST">
    <input type="hidden" name="prestamo_id" value="{{ prestamo._id }}">

    <label>ISBN de la copia:</label>
    <input type="text" name="isbn_copia" value="{{ prestamo.isbn_copia }}" required>

    <label>N&uacute;mero de copia:</label>
    <input type="number" name="numero_copia" value="{{ prestamo.numero_copia }}" required>

    <label>RUT del usuario:</label>
    <input type="text" name="usuario_rut" value="{{ prestamo.usuario_rut }}" required>

    <label>Fecha de pr&eacute;stamo:</label>
    <input type="date" name="fecha_prestamo" value="{{ prestamo.fecha_prestamo }}" required>

    <label>Fecha de devoluci&oacute;n:</label>
    <input type="date" name="fecha_devolucion" value="{{ prestamo.fecha_devolucion }}" required>

    <button type="submit">Actualizar</button>
</form>
{% endif %}
{% endblock %}
