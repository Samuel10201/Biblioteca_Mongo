{% extends "base_copias.html" %}

{% block formulario %}
<h3>Crear Copia</h3>

{% if error %}
<p class="msg-error">{{ error }}</p>
{% endif %}

<form method="POST">
    <label>ISBN de la edici&oacute;n:</label>
    <input type="text" name="isbn" value="{{ isbn or '' }}" required>

    <label>N&uacute;mero de copia:</label>
    <input type="number" name="numero" value="{{ numero or '' }}" required>

    <button type="submit">Crear</button>
</form>
{% endblock %}
