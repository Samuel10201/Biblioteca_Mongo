{% extends "base_autores.html" %}

{% block formulario %}
<h3>Editar Autor</h3>

{% if error %}
<p class="msg-error">{{ error }}</p>
{% endif %}

<form method="POST">
    <label>Nombre actual del autor:</label>
    <input type="text" name="nombre_actual" value="{{ nombre_actual or '' }}" required>

    <label>Nuevo nombre:</label>
    <input type="text" name="nombre_nuevo" value="{{ nombre_nuevo or '' }}" required>

    <button type="submit">Actualizar</button>
</form>
{% endblock %}
