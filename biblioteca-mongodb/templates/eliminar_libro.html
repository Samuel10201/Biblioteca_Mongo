{% extends "base_libros.html" %}

{% block formulario %}
<h3>Eliminar Libro</h3>

{% if error %}
<p class="msg-error">{{ error }}</p>
{% endif %}

<p class="msg-aviso">Al eliminar un libro se eliminan sus autores hu&eacute;rfanos, ediciones y copias asociadas.</p>

<form method="POST">
    <label>T&iacute;tulo del libro:</label>
    <input type="text" name="titulo" value="{{ titulo or '' }}" required>

    <button type="submit">Eliminar</button>
</form>
{% endblock %}
