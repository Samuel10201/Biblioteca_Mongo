{% extends "base_usuarios.html" %}

{% block formulario %}
<h3>Crear Usuario</h3>

{% if error %}
<p class="msg-error">{{ error }}</p>
{% endif %}

<form method="POST">
    <label>RUT:</label>
    <input type="text" name="rut" value="{{ rut or '' }}" required>

    <label>Nombre:</label>
    <input type="text" name="nombre" value="{{ nombre or '' }}" required>

    <button type="submit">Crear</button>
</form>
{% endblock %}
